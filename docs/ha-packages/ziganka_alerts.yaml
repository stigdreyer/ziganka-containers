# =============================================================================
# Ziganka — Signal K alert routing (v1: buzzer + Fusion)
# =============================================================================
# Deploy to: /config/packages/ziganka_alerts.yaml on the HALPI2 (HA volume)
# Enabled via configuration.yaml: `homeassistant: packages: !include_dir_named packages`
#
# Signal K is the single source of truth for severity (NotificationState) and
# signalling (NotificationMethod = sound/visual). HA only annunciates + lets you
# acknowledge. Routing is severity-driven; `method` gates the audible channels.
#
#   state       buzzer (Shelly)     Fusion (chime + TTS)
#   emergency   ✓ continuous        –
#   alarm       ✓ continuous        –
#   warn        –                   ✓ once
#   alert       – (ignored)         –
#
# Architecture (verified against the live boat 2026-06-17):
#   - Ingestion: signalk-ha fires the HA bus event `signalk_ziganka_iii_notification`
#     with the full payload (path/state/method/message/...).
#   - Authoritative active-set: GET http://localhost:3000/signalk/v2/api/notifications
#     (no auth for GET). NOTE: this list INCLUDES cleared (state=normal) entries,
#     so we always filter `state not in [normal, nominal]`.
#   - Writes (ack/silence, Fusion control, test POST) need a readwrite token,
#     stored in secrets.yaml as `signalk_auth_header` ("Bearer <jwt>").
#   - Mute verbs are POST (not PUT); we drive mute off the runtime status flags:
#     canAcknowledge -> acknowledge, elif canSilence -> silence, else local cut.
#
# Entities (verified):
#   Buzzer relay : switch.ziganka_iii_external_alarm        (Shelly, detached, local)
#   Mute input   : binary_sensor.ziganka_iii_external_alarm_input_0
#   Fusion player: media_player.halos       TTS: tts.piper       Fusion AUX = source2
# =============================================================================


# -----------------------------------------------------------------------------
# Helpers
# -----------------------------------------------------------------------------
input_text:
  ziganka_muted_paths:
    # JSON list of notification paths muted LOCALLY (used only when Signal K
    # can neither acknowledge nor silence a still-active alarm). Pruned on clear.
    name: Ziganka locally-muted paths
    max: 255
    initial: "[]"

input_number:
  ziganka_fusion_warn_volume:
    name: Fusion warn alert volume
    min: 0
    max: 24
    step: 1
    initial: 14
    icon: mdi:volume-high


# -----------------------------------------------------------------------------
# REST — authoritative active-set (source of truth) + reachability
# Reconcile poll every 30 s; also refreshed on demand by the event automations.
# -----------------------------------------------------------------------------
rest:
  - resource: "http://localhost:3000/signalk/v2/api/notifications"
    scan_interval: 30
    timeout: 8
    binary_sensor:
      # The buzzer "demand": ON when any un-muted, active emergency/alarm still
      # carries method "sound". This is the critical safety derivation.
      - name: "Ziganka Buzzer Demand"
        unique_id: ziganka_buzzer_demand
        device_class: sound
        value_template: >-
          {% set m = states('input_text.ziganka_muted_paths') %}
          {% set muted = (m | from_json) if m not in ['', 'unknown', 'unavailable', none] else [] %}
          {% set ns = namespace(on=false) %}
          {% for v in (value_json.values() if value_json else []) %}
            {% set val = v.value %}
            {% if val.state in ['emergency','alarm'] and 'sound' in (val.method or []) and v.path not in muted %}
              {% set ns.on = true %}
            {% endif %}
          {% endfor %}
          {{ 'on' if ns.on else 'off' }}
      # Reachability proxy: unavailable if the fetch fails (drives fail-loud).
      - name: "Ziganka SignalK Reachable"
        unique_id: ziganka_signalk_reachable
        device_class: connectivity
        value_template: "{{ value_json is not none }}"
    sensor:
      # Highest active SOUNDING severity — diagnostics / dashboard.
      - name: "Ziganka Alarm Highest"
        unique_id: ziganka_alarm_highest
        value_template: >-
          {% set order = {'emergency':4,'alarm':3,'warn':2,'alert':1} %}
          {% set ns = namespace(best='none', rank=0) %}
          {% for v in (value_json.values() if value_json else []) %}
            {% set val = v.value %}
            {% if val.state in order and 'sound' in (val.method or []) and order[val.state] > ns.rank %}
              {% set ns.rank = order[val.state] %}
              {% set ns.best = val.state %}
            {% endif %}
          {% endfor %}
          {{ ns.best }}


# -----------------------------------------------------------------------------
# REST commands — Signal K reads/writes + Fusion control (writes need the token)
# -----------------------------------------------------------------------------
rest_command:
  ziganka_sk_get_notifications:
    url: "http://localhost:3000/signalk/v2/api/notifications"
    method: GET
    timeout: 8

  ziganka_sk_acknowledge:
    url: "http://localhost:3000/signalk/v2/api/notifications/{{ id }}/acknowledge"
    method: POST
    headers:
      Authorization: !secret signalk_auth_header
    timeout: 6

  ziganka_sk_silence:
    url: "http://localhost:3000/signalk/v2/api/notifications/{{ id }}/silence"
    method: POST
    headers:
      Authorization: !secret signalk_auth_header
    timeout: 6

  ziganka_sk_post_notification:
    url: "http://localhost:3000/signalk/v2/api/notifications"
    method: POST
    headers:
      Authorization: !secret signalk_auth_header
    content_type: "application/json"
    payload: '{"state":"{{ state }}","message":"{{ message }}","path":"{{ path }}","method":["sound","visual"]}'
    timeout: 6

  ziganka_sk_clear:
    url: "http://localhost:3000/signalk/v2/api/notifications/{{ id }}"
    method: DELETE
    headers:
      Authorization: !secret signalk_auth_header
    timeout: 6

  ziganka_fusion_get:
    url: "http://localhost:3000/signalk/v1/api/vessels/self/entertainment/device/fusion1"
    method: GET
    timeout: 6

  ziganka_fusion_set_power:
    url: "http://localhost:3000/signalk/v1/api/vessels/self/entertainment/device/fusion1/state"
    method: PUT
    headers:
      Authorization: !secret signalk_auth_header
    content_type: "application/json"
    payload: '{"value":"{{ value }}"}'
    timeout: 6

  ziganka_fusion_set_source:
    url: "http://localhost:3000/signalk/v1/api/vessels/self/entertainment/device/fusion1/output/zone1/source"
    method: PUT
    headers:
      Authorization: !secret signalk_auth_header
    content_type: "application/json"
    payload: '{"value":"{{ value }}"}'
    timeout: 6

  ziganka_fusion_set_volume:
    url: "http://localhost:3000/signalk/v1/api/vessels/self/entertainment/device/fusion1/output/zone1/volume/master"
    method: PUT
    headers:
      Authorization: !secret signalk_auth_header
    content_type: "application/json"
    payload: '{"value":{{ value }}}'
    timeout: 6

  ziganka_fusion_set_muted:
    url: "http://localhost:3000/signalk/v1/api/vessels/self/entertainment/device/fusion1/output/zone1/isMuted"
    method: PUT
    headers:
      Authorization: !secret signalk_auth_header
    content_type: "application/json"
    payload: '{"value":{{ value }}}'
    timeout: 6


# -----------------------------------------------------------------------------
# Scripts
# -----------------------------------------------------------------------------
script:

  # Mute / acknowledge ALL currently-sounding alarms. Driven by runtime status
  # flags: acknowledge if possible, else silence, else local-cut (track path).
  ziganka_mute:
    alias: "Ziganka: mute / acknowledge active alarms"
    mode: queued
    max: 3
    sequence:
      # Quiet the buzzer immediately for responsiveness; reconcile confirms below.
      - service: switch.turn_off
        target: { entity_id: switch.ziganka_iii_external_alarm }
      - service: rest_command.ziganka_sk_get_notifications
        response_variable: resp
      - variables:
          notifs: "{{ resp.content if (resp is defined and resp.content is defined) else {} }}"
          sounding: >-
            {% set ns = namespace(items=[]) %}
            {% for k, v in notifs.items() %}
              {% set val = v.value %}
              {% if val.state in ['emergency','alarm','warn'] and 'sound' in (val.method or []) %}
                {% set ns.items = ns.items + [{'id': val.id, 'path': v.path, 'status': val.status}] %}
              {% endif %}
            {% endfor %}
            {{ ns.items }}
      - repeat:
          for_each: "{{ sounding }}"
          sequence:
            - choose:
                - conditions: "{{ repeat.item.status.canAcknowledge | default(false) }}"
                  sequence:
                    - service: rest_command.ziganka_sk_acknowledge
                      data: { id: "{{ repeat.item.id }}" }
                - conditions: "{{ repeat.item.status.canSilence | default(false) }}"
                  sequence:
                    - service: rest_command.ziganka_sk_silence
                      data: { id: "{{ repeat.item.id }}" }
              default:
                # Neither possible (e.g. emergency w/ canAcknowledge=false): keep
                # the local relay cut and remember the path so reconcile won't
                # re-energise it while the condition persists.
                - service: input_text.set_value
                  target: { entity_id: input_text.ziganka_muted_paths }
                  data:
                    value: >-
                      {% set m = states('input_text.ziganka_muted_paths') %}
                      {% set cur = (m | from_json) if m not in ['', 'unknown', 'unavailable', none] else [] %}
                      {{ (cur + [repeat.item.path]) | unique | list | tojson }}
      # Give Signal K a moment to reflect the acks, then refresh the demand so the
      # reconcile automation makes the relay match reality (stays off).
      - delay: { milliseconds: 1200 }
      - service: homeassistant.update_entity
        target:
          entity_id:
            - binary_sensor.ziganka_buzzer_demand
            - sensor.ziganka_alarm_highest

  # Fusion warn announcement: snapshot -> force AUX/volume -> chime+TTS once -> restore.
  ziganka_fusion_warn:
    alias: "Ziganka: Fusion warn announcement"
    mode: queued
    max: 3
    fields:
      message:
        description: Spoken message
    sequence:
      # --- Snapshot current Fusion state so we can return to it (e.g. Bluetooth)
      # after the alert. The Fusion's N2K status read-back works when the unit is
      # broadcasting PGN 130820; if it's ever empty we degrade gracefully (skip
      # restore, leave on AUX). prev_source is the short "sourceN" form the
      # set-source PUT expects (GET returns the full avsource path).
      - service: rest_command.ziganka_fusion_get
        response_variable: fus
      - variables:
          warnvol: "{{ states('input_number.ziganka_fusion_warn_volume') | int(14) }}"
          c: "{{ fus.content if (fus is defined and fus.content is defined and fus.content is mapping) else {} }}"
          z: "{{ c.output.zone1 if (c.output is defined and c.output.zone1 is defined) else {} }}"
          prev_source: >-
            {{ (z.source.value).split('.')[-1] if (z.source is defined and z.source.value) else '' }}
          prev_vol: "{{ z.volume.master.value if (z.volume is defined and z.volume.master is defined) else '' }}"
          prev_power: "{{ c.state.value if (c.state is defined) else '' }}"
          prev_muted: "{{ z.isMuted.value if (z.isMuted is defined) else false }}"
          # Only restore if we read a real source that isn't already AUX.
          can_restore: "{{ prev_source not in ['', 'source2', none] }}"
      # --- Force the Fusion on, unmuted, to AUX at the warn volume.
      - service: rest_command.ziganka_fusion_set_power
        data: { value: "on" }
      - service: rest_command.ziganka_fusion_set_muted
        data: { value: "false" }
      - service: rest_command.ziganka_fusion_set_source
        data: { value: "source2" }   # source2 = "Aux" (verified)
      - service: rest_command.ziganka_fusion_set_volume
        data: { value: "{{ warnvol }}" }
      # ~2.5 s for the Fusion to engage AUX. MA also auto-prepends its own
      # attention jingle to the TTS announcement.
      - delay: { milliseconds: 2500 }
      # Message spoken twice + "End of warning" terminator. The Snapcast server
      # buffer was lowered to 250 ms (MA → Snapcast → "Snapserver buffer size") so
      # the announcement tail is no longer clipped and it plays in full. No chime.
      - service: tts.speak
        continue_on_error: true
        data:
          entity_id: tts.piper
          media_player_entity_id: media_player.halos
          message: "Warning. {{ message }}. I repeat. Warning. {{ message }}. End of warning."
          cache: false
      # --- Restore the previous source (e.g. Bluetooth) AFTER the announcement.
      # media_player.halos stays 'idle' during MA announcements, so we can't
      # wait_template — estimate the spoken duration (~2.3 words/s) + jingle +
      # margin so the restore never fires mid-announcement (which would cut it).
      - condition: template
        value_template: "{{ can_restore }}"
      - delay:
          seconds: >-
            {{ (((7 + 2 * (message.split() | length)) / 2.3) | round(0, 'ceil') | int) + 4 }}
      # Lower the volume to the snapshot level FIRST (while still on AUX), so when
      # the source switches back the music doesn't briefly blast at the loud alert
      # volume.
      - service: rest_command.ziganka_fusion_set_volume
        data: { value: "{{ prev_vol | int(warnvol) }}" }
      - service: rest_command.ziganka_fusion_set_source
        data: { value: "{{ prev_source }}" }
      # The Fusion recalls a per-source volume on a source change, which races with
      # our set; let the switch settle, then re-assert the volume so our value wins.
      - delay: { milliseconds: 1500 }
      - service: rest_command.ziganka_fusion_set_muted
        data: { value: "{{ 'true' if prev_muted in [true, 'true', 'True'] else 'false' }}" }
      - service: rest_command.ziganka_fusion_set_power
        data: { value: "{{ prev_power if prev_power in ['on','off'] else 'on' }}" }
      - service: rest_command.ziganka_fusion_set_volume
        data: { value: "{{ prev_vol | int(warnvol) }}" }

  # --- Test helpers (use the v2 API; clear afterwards) ---
  ziganka_alert_test:
    alias: "Ziganka: raise self-test notification"
    fields:
      level:
        description: "emergency | alarm | warn"
    sequence:
      - service: rest_command.ziganka_sk_post_notification
        data:
          state: "{{ level | default('warn') }}"
          message: "Ziganka self-test {{ level | default('warn') }}"
          path: "ziganka.selftest"

  ziganka_alert_test_clear:
    alias: "Ziganka: clear self-test notification(s)"
    sequence:
      - service: rest_command.ziganka_sk_get_notifications
        response_variable: resp
      - variables:
          ids: >-
            {% set ns = namespace(ids=[]) %}
            {% for k, v in (resp.content if (resp is defined and resp.content is defined) else {}).items() %}
              {% if (v.path or '') == 'notifications.ziganka.selftest' %}{% set ns.ids = ns.ids + [v.value.id] %}{% endif %}
            {% endfor %}
            {{ ns.ids }}
      - repeat:
          for_each: "{{ ids }}"
          sequence:
            - service: rest_command.ziganka_sk_clear
              data: { id: "{{ repeat.item }}" }


# -----------------------------------------------------------------------------
# Automations
# -----------------------------------------------------------------------------
automation:

  # --- CRITICAL PATH: buzzer ---

  # Instant ON: react to an emergency/alarm event in the same tick (sub-second),
  # before the authoritative re-fetch completes. Fail toward sounding.
  - id: ziganka_buzzer_instant_on
    alias: "Ziganka: buzzer instant ON"
    mode: queued
    max: 20
    trigger:
      - platform: event
        event_type: signalk_ziganka_iii_notification
    condition:
      - "{{ trigger.event.data.state in ['emergency','alarm'] }}"
      - "{{ 'sound' in (trigger.event.data.method or []) }}"
      - >-
        {% set m = states('input_text.ziganka_muted_paths') %}
        {% set muted = (m | from_json) if m not in ['', 'unknown', 'unavailable', none] else [] %}
        {{ trigger.event.data.path not in muted }}
    action:
      - service: switch.turn_on
        target: { entity_id: switch.ziganka_iii_external_alarm }

  # Authoritative buzzer control. On every notification event (plus a 10 s
  # backstop and HA start), fetch the live active-set inline and set the relay
  # ON or OFF accordingly. Both transitions are event-driven and immediate; the
  # time_pattern bounds the worst case if a delta is ever missed. A failed fetch
  # yields 'unknown' -> relay is left as-is (the watchdog handles fail-loud).
  - id: ziganka_buzzer_eval
    alias: "Ziganka: evaluate buzzer from active-set"
    mode: queued
    max: 20
    trigger:
      - platform: event
        event_type: signalk_ziganka_iii_notification
      - platform: time_pattern
        seconds: "/10"
      - platform: homeassistant
        event: start
    action:
      - service: rest_command.ziganka_sk_get_notifications
        response_variable: resp
      - variables:
          notifs: "{{ resp.content if (resp is defined and resp.content is defined) else none }}"
          muted: >-
            {% set m = states('input_text.ziganka_muted_paths') %}
            {{ (m | from_json) if m not in ['', 'unknown', 'unavailable', none] else [] }}
          demand: >-
            {% if notifs is none or notifs is string %}unknown
            {% else %}
            {% set ns = namespace(on=false) %}
            {% for k, v in notifs.items() %}
              {% set val = v.value %}
              {% if val.state in ['emergency','alarm'] and 'sound' in (val.method or []) and v.path not in muted %}{% set ns.on = true %}{% endif %}
            {% endfor %}
            {{ 'on' if ns.on else 'off' }}
            {% endif %}
      - choose:
          - conditions: "{{ demand | trim == 'on' }}"
            sequence:
              - service: switch.turn_on
                target: { entity_id: switch.ziganka_iii_external_alarm }
          - conditions: "{{ demand | trim == 'off' }}"
            sequence:
              - service: switch.turn_off
                target: { entity_id: switch.ziganka_iii_external_alarm }
        # demand == 'unknown' (fetch failed): leave the relay as-is.

  # --- Fusion warn (lower severity) ---
  - id: ziganka_warn_announce
    alias: "Ziganka: Fusion warn announcement"
    mode: queued
    max: 5
    trigger:
      - platform: event
        event_type: signalk_ziganka_iii_notification
    condition:
      - "{{ trigger.event.data.state == 'warn' }}"
      - "{{ 'sound' in (trigger.event.data.method or []) }}"
    action:
      - service: script.ziganka_fusion_warn
        data:
          message: "{{ trigger.event.data.message | default('') }}"

  # --- Mute switch (Shelly input) -> acknowledge/silence ---
  - id: ziganka_mute_pressed
    alias: "Ziganka: mute switch pressed"
    mode: queued
    max: 3
    trigger:
      - platform: state
        entity_id: binary_sensor.ziganka_iii_external_alarm_input_0
    condition:
      # Ignore startup unknown/unavailable transitions; act on any real flip.
      - "{{ trigger.from_state.state not in ['unknown','unavailable', none] }}"
      - "{{ trigger.to_state.state not in ['unknown','unavailable', none] }}"
    action:
      - service: script.ziganka_mute

  # --- Clear handler: prune a path from the local-muted set when it clears ---
  - id: ziganka_clear_prune
    alias: "Ziganka: prune muted path on clear"
    mode: queued
    max: 20
    trigger:
      - platform: event
        event_type: signalk_ziganka_iii_notification
    condition:
      - "{{ trigger.event.data.state in ['normal','nominal'] }}"
    action:
      - service: input_text.set_value
        target: { entity_id: input_text.ziganka_muted_paths }
        data:
          value: >-
            {% set m = states('input_text.ziganka_muted_paths') %}
            {% set cur = (m | from_json) if m not in ['', 'unknown', 'unavailable', none] else [] %}
            {{ (cur | reject('eq', trigger.event.data.path) | list) | tojson }}
      - service: homeassistant.update_entity
        target: { entity_id: binary_sensor.ziganka_buzzer_demand }

  # --- Fail-loud watchdog: Signal K unreachable -> sound the buzzer ---
  - id: ziganka_watchdog_signalk
    alias: "Ziganka: fail-loud if Signal K unreachable"
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.ziganka_signalk_reachable
        to: "unavailable"
        for: { seconds: 60 }
      - platform: state
        entity_id: binary_sensor.ziganka_signalk_reachable
        to: "off"
        for: { seconds: 60 }
    action:
      - service: switch.turn_on
        target: { entity_id: switch.ziganka_iii_external_alarm }
      - service: persistent_notification.create
        data:
          notification_id: ziganka_sk_fault
          title: "Ziganka ALERT SYSTEM FAULT"
          message: >-
            Signal K has been unreachable for over 60 s. The buzzer has been
            sounded fail-loud because alarm state can no longer be determined.

  # --- Watchdog: buzzer (Shelly) offline -> can't sound; warn loudly in UI/log ---
  - id: ziganka_watchdog_shelly
    alias: "Ziganka: warn if buzzer (Shelly) offline"
    mode: single
    trigger:
      - platform: state
        entity_id: switch.ziganka_iii_external_alarm
        to: "unavailable"
        for: { minutes: 1 }
    action:
      - service: persistent_notification.create
        data:
          notification_id: ziganka_buzzer_fault
          title: "Ziganka buzzer OFFLINE"
          message: >-
            The Shelly buzzer is unreachable — audible alarms cannot sound.
            Check the Shelly at 192.168.88.227.
      - service: system_log.write
        data:
          level: error
          message: "Ziganka: Shelly buzzer (switch.ziganka_iii_external_alarm) is unavailable."
