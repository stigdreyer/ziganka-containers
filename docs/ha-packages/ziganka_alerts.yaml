# =============================================================================
# Ziganka — SignalK alert routing (Phase 1 / MVP)
# =============================================================================
#
# Deploy to:    /config/packages/ziganka_alerts.yaml  on the HALPI2 (HA volume)
#
# Enable packages once in /config/configuration.yaml (top-level):
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# Then `mkdir /config/packages` (if missing), drop this file in, restart HA.
#
# -----------------------------------------------------------------------------
# Phase 1 scope (MVP)
# -----------------------------------------------------------------------------
#   - Trigger on SignalK notifications via signalk-ha integration (push-based,
#     no polling, no auth token required)
#   - On new active alert: push to phone (always) + opportunistic Fusion TTS
#   - Snapshot/restore Fusion state around alert playback
#   - Acknowledge/silence buttons via push actions
#
# Phase 2 (Shelly buzzer + Govee LEDs + mute switch) is NOT in this file.
#
# -----------------------------------------------------------------------------
# Prerequisites on the HALPI2 (do these BEFORE restarting HA with this file)
# -----------------------------------------------------------------------------
#   1. signalk-ha custom integration installed (HACS) and configured, pointing
#      at localhost:3000. Notifications enabled (default: notifications.*).
#   2. ziganka-wyoming-piper-container installed and Wyoming integration
#      added in HA Settings → Devices → Add Integration → Wyoming Protocol,
#      pointing at host `localhost`, port `10200`.
#   3. (Optional) HA Companion app installed on a phone for push notifications.
#      Set input_text.ziganka_notify_target to your notify service.
#   4. (Optional) chime files at /config/www/alerts/{emergency,alarm,warning}.mp3.
#      The script gracefully skips chimes if files are missing.
#
# -----------------------------------------------------------------------------
# CUSTOMIZE BEFORE FIRST USE
# -----------------------------------------------------------------------------
# Set these helpers from HA UI (Settings → Devices & Services → Helpers):
#   - input_text.ziganka_ma_player       → media_player.halos
#   - input_text.ziganka_notify_target   → notify.mobile_app_<device> or notify.notify
# =============================================================================


# -----------------------------------------------------------------------------
# Helpers (state snapshots + user-tunable values)
# -----------------------------------------------------------------------------
input_text:
  fusion_pre_alert_state:
    name: Fusion state snapshot
    max: 255
    initial: ""

  ziganka_ma_player:
    name: MA media_player entity_id
    max: 100
    # Set to media_player.halos (Fusion stereo via signalk-ha)
    initial: "media_player.halos"

  ziganka_notify_target:
    name: HA Companion notify service
    max: 100
    # Set to notify.mobile_app_<devicename> or notify.notify to broadcast.
    initial: "notify.notify"

input_number:
  ziganka_vol_emergency:
    name: Alert volume — emergency
    min: 0
    max: 24
    step: 1
    initial: 20
    icon: mdi:alert-octagon
  ziganka_vol_alarm:
    name: Alert volume — alarm
    min: 0
    max: 24
    step: 1
    initial: 18
    icon: mdi:alarm-light
  ziganka_vol_warning:
    name: Alert volume — warning
    min: 0
    max: 24
    step: 1
    initial: 14
    icon: mdi:alert

input_boolean:
  ziganka_alert_active:
    name: Alert sequence in progress
    icon: mdi:alarm-light
  ziganka_night_mode:
    name: Night mode (volumes scaled 50%)
    icon: mdi:weather-night


# -----------------------------------------------------------------------------
# Sensors — Fusion state (REST)
# -----------------------------------------------------------------------------
# Alert data comes from signalk-ha (sensor.signalk_last_notification) — no
# polling sensor needed here.
rest:
  - resource: "http://localhost:3000/signalk/v1/api/vessels/self/entertainment/device/fusion1"
    scan_interval: 60
    timeout: 5
    sensor:
      - name: "Fusion Device"
        unique_id: ziganka_fusion_device
        value_template: "{{ 'reachable' if value_json is mapping else 'unreachable' }}"
        json_attributes_path: "$"
        json_attributes:
          - state
          - output


# -----------------------------------------------------------------------------
# Template sensors — Fusion fields
# -----------------------------------------------------------------------------
template:
  - sensor:
      - name: "Fusion Power"
        unique_id: ziganka_fusion_power
        state: >-
          {% set s = state_attr('sensor.fusion_device', 'state') %}
          {{ s.value if s and s.value is defined else 'unknown' }}

      - name: "Fusion Source"
        unique_id: ziganka_fusion_source
        state: >-
          {% set o = state_attr('sensor.fusion_device', 'output') %}
          {{ o.zone1.source.value if o and o.zone1 is defined and o.zone1.source is defined else 'unknown' }}

      - name: "Fusion Muted"
        unique_id: ziganka_fusion_muted
        state: >-
          {% set o = state_attr('sensor.fusion_device', 'output') %}
          {{ o.zone1.isMuted.value if o and o.zone1 is defined and o.zone1.isMuted is defined else false }}

      - name: "Fusion Volume"
        unique_id: ziganka_fusion_volume
        state: >-
          {% set o = state_attr('sensor.fusion_device', 'output') %}
          {{ o.zone1.volume.master.value if o and o.zone1 is defined and o.zone1.volume is defined else 0 }}

  - binary_sensor:
      - name: "Fusion Reachable"
        unique_id: ziganka_fusion_reachable
        state: "{{ states('sensor.fusion_device') == 'reachable' }}"


# -----------------------------------------------------------------------------
# REST commands — Fusion control + alert ack/silence
# -----------------------------------------------------------------------------
rest_command:
  fusion_set_power:
    url: "http://localhost:3000/signalk/v1/api/vessels/self/entertainment/device/fusion1/state"
    method: PUT
    headers: { Content-Type: application/json }
    payload: '{"value": "{{ value }}"}'
    timeout: 5

  fusion_set_source:
    url: "http://localhost:3000/signalk/v1/api/vessels/self/entertainment/device/fusion1/output/zone1/source"
    method: PUT
    headers: { Content-Type: application/json }
    payload: '{"value": "{{ value }}"}'
    timeout: 5

  fusion_set_muted:
    url: "http://localhost:3000/signalk/v1/api/vessels/self/entertainment/device/fusion1/output/zone1/isMuted"
    method: PUT
    headers: { Content-Type: application/json }
    payload: '{"value": {{ value }} }'
    timeout: 5

  fusion_set_volume:
    url: "http://localhost:3000/signalk/v1/api/vessels/self/entertainment/device/fusion1/output/zone1/volume/master"
    method: PUT
    headers: { Content-Type: application/json }
    payload: '{"value": {{ value }} }'
    timeout: 5

  signalk_acknowledge_alert:
    url: "http://localhost:3000/plugins/signalk-alert-manager/alerts/{{ alert_id }}/acknowledge"
    method: POST
    timeout: 5

  signalk_silence_alert:
    url: "http://localhost:3000/plugins/signalk-alert-manager/alerts/{{ alert_id }}/silence"
    method: POST
    timeout: 5


# -----------------------------------------------------------------------------
# Scripts — alert sequence + helpers
# -----------------------------------------------------------------------------
script:

  ziganka_alert_snapshot_fusion:
    alias: "Ziganka: snapshot Fusion state"
    sequence:
      - service: homeassistant.update_entity
        target:
          entity_id: sensor.fusion_device
      - delay: { milliseconds: 600 }
      - service: input_text.set_value
        target:
          entity_id: input_text.fusion_pre_alert_state
        data:
          value: "{{ {'power': states('sensor.fusion_power'), 'source': states('sensor.fusion_source'), 'muted': states('sensor.fusion_muted'), 'volume': states('sensor.fusion_volume') | int(0)} | to_json }}"

  ziganka_alert_restore_fusion:
    alias: "Ziganka: restore Fusion state"
    sequence:
      - variables:
          raw: "{{ states('input_text.fusion_pre_alert_state') }}"
          snap: "{{ raw | trim | from_json({}) if raw | trim not in ['', 'unknown', 'unavailable'] else {} }}"
      - choose:
          - conditions: "{{ snap | length > 0 }}"
            sequence:
              - service: rest_command.fusion_set_volume
                data:
                  value: "{{ snap.volume | int(8) }}"
              - service: rest_command.fusion_set_source
                data:
                  value: "{{ snap.source if snap.source not in ['unknown','unavailable','none'] else 'source2' }}"
              - service: rest_command.fusion_set_muted
                data:
                  value: "{{ 'true' if snap.muted in [true, 'true', 'True', 'on'] else 'false' }}"
              - service: rest_command.fusion_set_power
                data:
                  value: "{{ snap.power if snap.power in ['on', 'off'] else 'on' }}"

  ziganka_alert_force_fusion:
    alias: "Ziganka: force Fusion to alert state"
    fields:
      priority:
        description: "emergency | alarm | warning"
    sequence:
      - variables:
          base_volume: >-
            {% if priority == 'emergency' %}
              {{ states('input_number.ziganka_vol_emergency') | int(20) }}
            {% elif priority == 'alarm' %}
              {{ states('input_number.ziganka_vol_alarm') | int(18) }}
            {% else %}
              {{ states('input_number.ziganka_vol_warning') | int(14) }}
            {% endif %}
          final_volume: >-
            {% if is_state('input_boolean.ziganka_night_mode', 'on') %}
              {{ (base_volume | int * 0.5) | int }}
            {% else %}
              {{ base_volume | int }}
            {% endif %}
      - service: rest_command.fusion_set_power
        data: { value: "on" }
      - service: rest_command.fusion_set_source
        data: { value: "source2" }   # AUX = source2 on this Fusion
      - service: rest_command.fusion_set_muted
        data: { value: "false" }
      - service: rest_command.fusion_set_volume
        data:
          value: "{{ final_volume }}"
      - delay: { milliseconds: 400 }   # let Fusion settle on new source

  ziganka_alert_play_message:
    alias: "Ziganka: play chime + TTS"
    fields:
      priority:
        description: "Alert priority"
      message:
        description: "Spoken message"
    sequence:
      - variables:
          ma_player: "{{ states('input_text.ziganka_ma_player') }}"
          chime_url: >-
            {% if priority in ['emergency', 'alarm', 'warning'] %}
              http://localhost:8123/local/alerts/{{ priority }}.mp3
            {% else %}
              none
            {% endif %}

      - choose:
          - conditions: "{{ chime_url != 'none' }}"
            sequence:
              - service: media_player.play_media
                target:
                  entity_id: "{{ ma_player }}"
                data:
                  media_content_type: music
                  media_content_id: "{{ chime_url }}"
                continue_on_error: true
              - wait_template: >-
                  {{ states(ma_player) in ['idle', 'off', 'paused'] }}
                timeout: "00:00:02"
                continue_on_timeout: true

      - service: tts.speak
        data:
          entity_id: tts.piper
          media_player_entity_id: "{{ ma_player }}"
          message: "{{ priority | capitalize }}: {{ message }}"
          cache: false
        continue_on_error: true
      - wait_template: >-
          {{ states(ma_player) in ['idle', 'off', 'paused'] }}
        timeout: "00:00:10"
        continue_on_timeout: true

  ziganka_alert_handle:
    alias: "Ziganka: handle alert end-to-end"
    mode: queued
    max: 5
    fields:
      alert_id: { description: "SignalK alert id" }
      priority: { description: "Alert priority: emergency | alarm | warning | caution" }
      message: { description: "Alert message" }
    sequence:
      - service: input_boolean.turn_on
        target: { entity_id: input_boolean.ziganka_alert_active }

      # Channel A: phone push (always — Fusion-independent)
      - service: "{{ states('input_text.ziganka_notify_target') }}"
        data:
          title: "⚠ {{ priority | capitalize }}"
          message: "{{ message }}"
          data:
            actions:
              - action: "ZIGANKA_ACK_{{ alert_id }}"
                title: "Acknowledge"
              - action: "ZIGANKA_SILENCE_{{ alert_id }}"
                title: "Silence"
            push:
              sound:
                name: "default"
                critical: "{{ 1 if priority in ['emergency', 'alarm'] else 0 }}"
                volume: "{{ 1.0 if priority == 'emergency' else 0.7 }}"
        continue_on_error: true

      # Channel B: opportunistic Fusion TTS (caution priority skips audio)
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ priority != 'caution' }}"
              - condition: state
                entity_id: binary_sensor.fusion_reachable
                state: "on"
            sequence:
              - service: script.ziganka_alert_snapshot_fusion
              - service: script.ziganka_alert_force_fusion
                data:
                  priority: "{{ priority }}"
              - service: script.ziganka_alert_play_message
                data:
                  priority: "{{ priority }}"
                  message: "{{ message }}"
              - service: script.ziganka_alert_restore_fusion
        default:
          - service: system_log.write
            data:
              message: "Ziganka: skipping audio (caution priority or Fusion unreachable)"
              level: info

      - service: input_boolean.turn_off
        target: { entity_id: input_boolean.ziganka_alert_active }

  ziganka_alert_test:
    alias: "Ziganka: test alert (warning priority)"
    sequence:
      - service: script.ziganka_alert_handle
        data:
          alert_id: "test"
          priority: "warning"
          message: "This is a test of the Ziganka alert system."


# -----------------------------------------------------------------------------
# Automations — wire trigger to handler, ack/silence from push actions
# -----------------------------------------------------------------------------
automation:

  - alias: "Ziganka: fire alert handler on new active notification"
    id: ziganka_alert_fire
    description: >
      Triggers when signalk-ha pushes a new notification via sensor.signalk_last_notification.
      Maps signalk-ha state values (emergency/alarm/warn/alert) to internal priority levels.
      Ignores normal/nominal clearance events.
    mode: queued
    max: 5
    trigger:
      - platform: state
        entity_id: sensor.signalk_last_notification
    condition:
      - condition: template
        value_template: >-
          {{ trigger.to_state.attributes.get('state', 'normal')
             not in ['normal', 'nominal', 'unknown', 'unavailable'] }}
    action:
      - variables:
          notif_state: "{{ trigger.to_state.attributes.get('state', 'normal') }}"
          # Map signalk-ha state values to internal priority levels
          priority: >-
            {% set map = {'emergency': 'emergency', 'alarm': 'alarm', 'warn': 'warning', 'alert': 'caution'} %}
            {{ map.get(notif_state, 'warning') }}
          alert_id: "{{ trigger.to_state.attributes.get('id', 'unknown') }}"
          message: "{{ trigger.to_state.attributes.get('message', 'Unknown alert') }}"
      - service: script.ziganka_alert_handle
        data:
          alert_id: "{{ alert_id }}"
          priority: "{{ priority }}"
          message: "{{ message }}"

  - alias: "Ziganka: ack alert from phone push"
    id: ziganka_ack_from_push
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
    condition:
      - condition: template
        value_template: "{{ trigger.event.data.action.startswith('ZIGANKA_ACK_') }}"
    action:
      - service: rest_command.signalk_acknowledge_alert
        data:
          alert_id: "{{ trigger.event.data.action | replace('ZIGANKA_ACK_', '') }}"

  - alias: "Ziganka: silence alert from phone push"
    id: ziganka_silence_from_push
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
    condition:
      - condition: template
        value_template: "{{ trigger.event.data.action.startswith('ZIGANKA_SILENCE_') }}"
    action:
      - service: rest_command.signalk_silence_alert
        data:
          alert_id: "{{ trigger.event.data.action | replace('ZIGANKA_SILENCE_', '') }}"


