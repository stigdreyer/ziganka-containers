name: Signal K Server
app_id: signalk-server
# Ziganka fork of halos-marine-containers' signalk-server. The container image
# is dirkwa's fork on a rolling ":dirkwa" tag (see docker-compose.yml), so this
# version tracks the packaged *definition*, not the image. upstream_version is
# the SignalK base the fork derives from.
version: 2.29.0-zig1
upstream_version: 2.29.0
description: Signal K server for marine data processing and routing
long_description: |
  Signal K is a modern and open data format for marine use. A Signal K server
  provides a central hub for collecting, processing, and distributing marine
  data from multiple sources including NMEA 0183, NMEA 2000, and other sensors.

  Features:
  - WebSocket API for real-time data streaming
  - Data logging and historical playback
  - Web app server for marine applications
  - Plugin system for extending functionality
  - Instrument integration and display
homepage: https://signalk.org/
maintainer: Stig Dreyer <stigdreyer@nxtmilestone.com>
license: Apache-2.0
tags:
  - role::container-app
  - field::ziganka
  - category::navigation
  - interface::web
  - use::routing
  - network::server
debian_section: net
architecture: all
depends:
  - docker.io (>= 20.10) | docker-ce (>= 20.10)
  - python3-bcrypt
web_ui:
  enabled: true
  path: /
  port: 3000
  protocol: http
  visible: true
layout:
  priority: 40
  width: 2
  height: 2
  x_offset: 0
  y_offset: 0
routing:
  host_port: 3000
  auth:
    # Signal K authenticates users itself via Authelia OIDC (native OAuth), so
    # there is no Traefik edge gate; mode: oidc wires the Authelia client
    # scaffolding declaratively. The registered client id is "signalk" (the
    # app_id is signalk-server), and the redirect is path-based. This replaces
    # the imperative client-secret / Authelia-snippet / runtime.env provisioning
    # our prestart used to do — the framework now owns it.
    mode: oidc
    oidc:
      client_id: signalk
      client_name: "Signal K Server"
      token_endpoint_auth_method: client_secret_post
      scopes: [openid, profile, email, groups]
      consent_mode: implicit
      redirect:
        style: path
        path: /signalk-server/signalk/v1/auth/oidc/callback
      env:
        SIGNALK_OIDC_CLIENT_SECRET: secret
        SIGNALK_OIDC_ISSUER: issuer
        SIGNALK_OIDC_REDIRECT_URI: redirect
default_config:
  # Container image — overridable per-device in Cockpit (see config.yml).
  # Changing it restarts the service, pulling + recreating with the new image.
  SIGNALK_IMAGE: "ghcr.io/dirkwa/signalk-server:dirkwa"
  # OIDC: the dynamic values (client secret, issuer, redirect) are supplied at
  # runtime via the generated runtime.env; only the static settings live here.
  SIGNALK_OIDC_ENABLED: "true"
  SIGNALK_OIDC_CLIENT_ID: "signalk"
  SIGNALK_OIDC_SCOPE: "openid email profile groups"
  SIGNALK_OIDC_PROVIDER_NAME: "HaLOS SSO"
  SIGNALK_OIDC_DEFAULT_PERMISSION: "readonly"
  SIGNALK_OIDC_ADMIN_GROUPS: "admins"
  SIGNALK_OIDC_READWRITE_GROUPS: "users"
  SIGNALK_OIDC_AUTO_LOGIN: "true"
