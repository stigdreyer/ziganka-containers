services:
  music-assistant:
    image: ghcr.io/music-assistant/server:2.9.4
    container_name: music-assistant
    # MA (aiohttp) verifies outbound TLS against certifi's bundle, baked into
    # the image — it ignores SSL_CERT_FILE and the system cert store, so it
    # can't trust the self-signed HaLOS CA, and the HA-SSO OAuth/WebSocket to
    # https://${HALOS_DOMAIN}:4433 fails verification. Append the HaLOS CA
    # (from the host bundle overlaid at /etc/ssl/certs below) into certifi's
    # cacert.pem *before* MA starts — it caches its SSL context at startup, so
    # patching after the fact has no effect — then exec the image's real
    # entrypoint. The container fs resets on each recreate, so this re-applies
    # cleanly every start. (certifi path resolved dynamically to survive Python
    # version bumps; the entrypoint args mirror the image default.)
    entrypoint:
      - /bin/sh
      - -c
      - "cat /etc/ssl/certs/ca-certificates.crt >> \"$(python3 -c 'import certifi;print(certifi.where())')\"; exec /usr/local/bin/entrypoint.sh --data-dir /data --cache-dir /data/.cache"
    depends_on:
      network-check:
        condition: service_healthy
    init: true
    restart: unless-stopped
    logging:
      driver: journald
      options:
        tag: "{{.Name}}"
    environment:
      - LOG_LEVEL=info
      # Covers code paths that DO honor SSL_CERT_FILE (e.g. plain
      # ssl.create_default_context()); the certifi paths are handled by the
      # entrypoint append above. Harmless belt-and-braces.
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
    volumes:
      # MA state, providers config, cache
      - ${CONTAINER_DATA_ROOT}/data:/data
      # DRM-free local music; populate via rsync or by extending this mount
      # to include a USB stick mountpoint under /media/<user>/<label>.
      - ${CONTAINER_DATA_ROOT}/library:/library:ro
      # Host cert dir (contains the HaLOS Device CA + public CAs). Source for
      # the entrypoint's certifi append, and trusted by system-store code
      # paths. Mount the dir, not a file — the package postinst mkdir -p's
      # every bind-mount source (errors on a file); a dir source is a no-op.
      - /etc/ssl/certs:/etc/ssl/certs:ro
    # Host networking is required so that librespot (Spotify Connect) and
    # shairport-sync (AirPlay) advertise the HALPI2's real LAN IP rather than
    # a Docker-internal address that clients cannot reach. Web UI on :8095 and
    # Snapcast ports are directly accessible on the host without port mapping.
    network_mode: host
    # Resolve the HaLOS domain to the loopback Traefik listener so server-side
    # calls from inside the container succeed (e.g. the Home Assistant OAuth
    # token exchange against https://${HALOS_DOMAIN}:4433 when using HA as an
    # SSO provider). The container's resolver does not do mDNS, so ".local"
    # names otherwise fail with "Domain name not found". HALOS_DOMAIN comes
    # from the generated prestart runtime.env.
    extra_hosts:
      - "${HALOS_DOMAIN}:127.0.0.1"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8095"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  network-check:
    image: busybox
    container_name: ma-network-check
    restart: unless-stopped
    volumes:
      - ./assets/wait-for-internet.sh:/wait-for-internet.sh:ro
    entrypoint: ["/bin/sh", "/wait-for-internet.sh"]
    # Becomes healthy once /tmp/ready is touched (internet up or timeout reached).
    healthcheck:
      test: ["CMD-SHELL", "[ -f /tmp/ready ]"]
      interval: 5s
      timeout: 3s
      start_period: 0s
      retries: 1
    logging:
      driver: journald
      options:
        tag: "{{.Name}}"
