version: "1.0"

groups:
  - id: general
    label: General Settings
    fields:
      - id: HA_TZ
        label: Timezone
        type: string
        default: Europe/Oslo
        required: true
        description: "Timezone for Home Assistant (e.g. Europe/Oslo, Atlantic/Canary)"

  - id: signalk
    label: SignalK Integration
    description: >
      Connection to the SignalK server for the Ziganka alert system. The
      SignalK URL is consumed by the HA package at /config/packages/ziganka_alerts.yaml
      (REST commands and the signalk-ha HACS integration).
    fields:
      - id: SIGNALK_URL
        label: SignalK Server URL
        type: string
        default: "http://localhost:3000"
        required: true
        description: "Base URL of the SignalK server. Default works because HA runs on the host network alongside SignalK."

  - id: fusion_alerts
    label: Fusion Alert Routing
    description: >
      Reference defaults for the Ziganka alert package (deployed separately to
      /config/packages/ziganka_alerts.yaml). In v1 only WARN-level alerts use
      the Fusion (chime + spoken TTS, once); emergency/alarm use the external
      buzzer instead. The package reads the live warn volume from the
      input_number.ziganka_fusion_warn_volume helper (UI-tunable); the value
      below is the default. Volumes use the Fusion's 0-24 scale.
    fields:
      - id: FUSION_ZONE
        label: Fusion Output Zone
        type: string
        default: zone1
        required: true
        description: "SignalK Fusion zone path segment (e.g. zone1). Most single-stereo installs use zone1."
      - id: FUSION_AUX_SOURCE
        label: Fusion AUX Source ID
        type: string
        default: source2
        required: true
        description: "Fusion source the HALPI2 audio is wired to. Verified source2 = \"Aux\" on this device (GET entertainment/device/fusion1/avsource lists the names)."
      - id: ALERT_VOL_WARNING
        label: Warning Alert Volume (0-24)
        type: string
        default: "14"
        required: true
        description: "Default Fusion volume for warn-level alerts. Audible across the saloon at anchor without being startling. Live value is set in HA via input_number.ziganka_fusion_warn_volume."
