name: Home Assistant
app_id: homeassistant
version: 2026.5.4-1
upstream_version: 2026.5.4
description: Open-source home automation platform
long_description: |
  Home Assistant is the central automation hub for the boat. It controls
  lights, monitors instrumentation, and surfaces media controls for Music
  Assistant via the official Music Assistant integration.

  Features:
  - Web UI / Lovelace dashboards
  - Thousands of integrations
  - Powerful automation engine
  - First-class Music Assistant integration (media_player entities,
    services, automations)
homepage: https://www.home-assistant.io/
maintainer: Stig Dreyer <stig.dreyer@busy-brain.de>
license: Apache-2.0
tags:
  - role::container-app
  - field::ziganka
  - category::automation
  - interface::web
  - use::organizing
debian_section: web
architecture: all
depends:
  - docker.io (>= 20.10) | docker-ce (>= 20.10)
conflicts:
  - boat-homeassistant-container
web_ui:
  enabled: true
  path: /
  port: 8123
  protocol: http
  visible: true
routing:
  host_port: 8123
  auth:
    # Explicit: HA is gated by Authelia ForwardAuth on its proxied per-app
    # port (e.g. :4433) and the /homeassistant/ dashboard link. Note this
    # gate is bypassable on the native :8123 port and can interfere with the
    # HA companion app / WebSocket / long-lived tokens. Set deliberately
    # rather than relying on the build tool's default.
    mode: forward_auth
layout:
  priority: 60
  width: 2
  height: 2
default_config:
  # Override on install if your boat is in a different timezone.
  HA_TZ: Europe/Oslo
