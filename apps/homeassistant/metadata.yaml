name: Home Assistant
app_id: homeassistant
version: 2026.7.2-1
upstream_version: 2026.7.2
description: Open-source home automation platform
long_description: |
  Home Assistant is the central automation hub for the boat. It controls
  lights, monitors instrumentation, and surfaces media controls for Music
  Assistant via the official Music Assistant integration.

  Features:
  - Web UI / Lovelace dashboards
  - Thousands of integrations
  - Powerful automation engine
  - First-class Music Assistant integration (media_player entities,
    services, automations)
homepage: https://www.home-assistant.io/
maintainer: Stig Dreyer <stig.dreyer@busy-brain.de>
license: Apache-2.0
tags:
  - role::container-app
  - field::ziganka
  - category::automation
  - interface::web
  - use::organizing
debian_section: web
architecture: all
depends:
  - docker.io (>= 20.10) | docker-ce (>= 20.10)
conflicts:
  - boat-homeassistant-container
web_ui:
  enabled: true
  path: /
  port: 8123
  protocol: http
  visible: true
routing:
  host_port: 8123
  auth:
    # HA has its own mandatory login on every door (:8123 and the proxied
    # :4433), so a Traefik ForwardAuth layer would be redundant, wouldn't
    # cover the native :8123 port, and is known to break the Companion app /
    # WebSocket / long-lived tokens / /api/. We instead rely on HA's own auth
    # and wire real SSO via the hass-oidc-auth HACS integration against
    # Authelia (see docs/homeassistant-oidc.md). Set explicitly to override
    # the build tool's forward_auth default.
    mode: none
layout:
  priority: 60
  width: 2
  height: 2
default_config:
  # Override on install if your boat is in a different timezone.
  HA_TZ: Europe/Oslo
