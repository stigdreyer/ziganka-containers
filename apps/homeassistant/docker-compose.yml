services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.5.0
    container_name: homeassistant
    init: false
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    logging:
      driver: journald
      options:
        tag: "{{.Name}}"
    environment:
      - TZ=${HA_TZ:-Europe/Oslo}
      - SIGNALK_URL=${SIGNALK_URL:-http://localhost:3000}
      - FUSION_ZONE=${FUSION_ZONE:-zone1}
      - FUSION_AUX_SOURCE=${FUSION_AUX_SOURCE:-aux1}
      - ALERT_VOL_EMERGENCY=${ALERT_VOL_EMERGENCY:-20}
      - ALERT_VOL_ALARM=${ALERT_VOL_ALARM:-18}
      - ALERT_VOL_WARNING=${ALERT_VOL_WARNING:-14}
    volumes:
      - ${CONTAINER_DATA_ROOT}/config:/config
      - /run/dbus:/run/dbus:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/manifest.json"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    # Host networking is required for Bluetooth (BlueZ via D-Bus) and mDNS
    # device discovery. Web UI is accessible directly at http://halos.local:8123.
