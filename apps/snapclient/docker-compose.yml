services:
  snapclient:
    # Build from the Dockerfile shipped in this package. After install, the
    # build context is /var/lib/container-apps/ziganka-snapclient-container/.
    # Tag the built image with SNAPCLIENT_VERSION instead of using
    # `pull_policy: build`: that setting forced a full rebuild — re-resolving
    # the FROM base image from the registry — on every service start,
    # including every boot, making snapclient depend on network being up
    # before the LAN's DNS had settled. With a version-tagged image, Compose
    # only builds when that tag doesn't exist locally yet (fresh install, or
    # a version bump from check-snapclient-updates.yml, which updates this
    # tag alongside the build arg); a plain restart reuses the cached image.
    build:
      context: ./assets
      dockerfile: Dockerfile
      args:
        SNAPCLIENT_VERSION: "0.35.0"
    image: ziganka-snapclient:0.35.0
    container_name: snapclient
    init: true
    restart: unless-stopped
    logging:
      driver: journald
      options:
        tag: "{{.Name}}"
    # Snapcast clients use mDNS / TCP discovery on the LAN; host networking
    # is the standard pattern. This also keeps the client off
    # halos-proxy-network (no web UI to publish anyway).
    network_mode: host
    # /dev/snd is the only audio device on the HALPI2; HDMI is the default
    # sink when nothing else is wired.
    devices:
      - /dev/snd
    group_add:
      - audio
    command: >
      --host=${SNAPSERVER_HOST:-halos.local}
      --soundcard=${SNAPCLIENT_SOUNDCARD:-default}
      --hostID=${SNAPCLIENT_NAME:-Saloon}
