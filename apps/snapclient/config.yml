version: "1.0"

groups:
  - id: snapcast
    label: Snapcast Settings
    description: Connection settings for the Snapcast server
    fields:
      - id: SNAPSERVER_HOST
        label: Snapcast Server Host
        type: string
        default: "127.0.0.1"
        required: true
        description: "Hostname or IP of the Snapcast server. Use 127.0.0.1 when Music Assistant runs on the same device (snapclient uses host networking)."

      - id: SNAPCLIENT_SOUNDCARD
        label: Sound Card
        type: string
        default: "plughw:CARD=vc4hdmi1,DEV=0"
        required: true
        description: "ALSA sound card for audio output. Default targets the HALPI2's HDMI port via the vc4-hdmi driver. Run 'aplay -L' on the host to list alternatives (e.g. plughw:CARD=vc4hdmi1,DEV=0 for the second HDMI output)."

      - id: SNAPCLIENT_NAME
        label: Player Name
        type: string
        default: Saloon
        required: true
        description: "Display name for this Snapcast client (shown in the Music Assistant player list)"
