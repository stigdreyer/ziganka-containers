name: Snapcast Client
app_id: snapclient
version: 0.34.0-1
upstream_version: 0.34.0
description: Snapcast client for HDMI audio playback
long_description: |
  Snapcast client that connects to the Snapserver bundled with Music
  Assistant and plays audio out the host's ALSA device — i.e. the HDMI port
  of the HALPI2. This is the only container in the boat stack that holds
  /dev/snd. Multi-room audio is a future iteration: deploy more snapclient
  instances per zone and they all sync against the same Snapserver.
homepage: https://github.com/badaix/snapcast
maintainer: Stig Dreyer <stig.dreyer@busy-brain.de>
license: GPL-3.0
tags:
  - role::container-app
  - field::ziganka
  - category::audio
  - sound::player
debian_section: sound
architecture: all
depends:
  - docker.io (>= 20.10) | docker-ce (>= 20.10)
  - ziganka-music-assistant-container
conflicts:
  - boat-snapclient-container
web_ui:
  enabled: false
routing:
  host_port: 1780
  auth:
    mode: none
default_config:
  # 127.0.0.1 works because snapclient uses host networking and MA publishes
  # port 1704 to the host. Override if Snapserver runs on a different device.
  SNAPSERVER_HOST: "127.0.0.1"
  # Run `aplay -L` on the host to list devices. On a HALPI2 with one active
  # HDMI output use plughw:CARD=vc4hdmi0,DEV=0 or plughw:CARD=vc4hdmi1,DEV=0.
  SNAPCLIENT_SOUNDCARD: "plughw:CARD=vc4hdmi1,DEV=0"
  # Logical room name shown in MA. Override per zone for multi-room.
  SNAPCLIENT_NAME: Saloon
