name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Auto-bump Debian revisions
        run: |
          for app_dir in apps/*/; do
            app=$(basename "$app_dir")
            meta="${app_dir}metadata.yaml"
            upstream=$(grep '^upstream_version:' "$meta" 2>/dev/null | awk '{print $2}')
            if [ -z "$upstream" ]; then
              upstream=$(grep '^version:' "$meta" | awk '{print $2}' | sed 's/-[0-9]*$//')
            fi
            rev=$(git rev-list HEAD -- "$app_dir" | wc -l | tr -d ' ')
            sed -i "s/^version: .*/version: ${upstream}-${rev}/" "$meta"
            echo "$app: ${upstream}-${rev}"
          done

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential devscripts dpkg-dev debhelper lintian apt-utils

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: false

      - name: Build packages
        run: ./tools/build-all.sh

      - name: List built packages
        run: ls -lh build/

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: deb-packages
          path: build/*.deb
          retention-days: 14

  publish-apt:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Download built packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: deb-packages
          path: build

      - name: Install APT repo tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends apt-utils dpkg-dev

      - name: Import GPG signing key
        run: echo "${{ secrets.APT_SIGNING_KEY }}" | gpg --batch --import

      - name: Build APT repository
        run: |
          set -e
          REPO="apt-repo"
          mkdir -p "$REPO/pool/main"
          cp build/*.deb "$REPO/pool/main/"

          cd "$REPO"
          for arch in all amd64 arm64 armhf; do
            mkdir -p "dists/stable/main/binary-$arch"
            dpkg-scanpackages --arch "$arch" pool/main > "dists/stable/main/binary-$arch/Packages"
            gzip -k "dists/stable/main/binary-$arch/Packages"
          done
          cd ..

          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="Ziganka" \
            -o APT::FTPArchive::Release::Label="Ziganka" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Components="main" \
            -o APT::FTPArchive::Release::Architectures="all amd64 arm64 armhf" \
            release "$REPO/dists/stable" > "$REPO/dists/stable/Release"

          gpg --batch --yes --armor --detach-sign \
            --output "$REPO/dists/stable/Release.gpg" \
            "$REPO/dists/stable/Release"
          gpg --batch --yes --clearsign \
            --output "$REPO/dists/stable/InRelease" \
            "$REPO/dists/stable/Release"

          gpg --armor --export > "$REPO/ziganka.gpg"

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apt-repo
          keep_files: false
